name: Deploy Flutter Web → GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # permet de déclencher manuellement depuis GitHub

# Permissions requises pour publier sur GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois (annule les précédents si en attente)
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Flutter SDK ─────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true     # cache les packages Flutter entre les runs

      # ── 3. Dépendances ─────────────────────────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      # ── 4. Tests avant build ───────────────────────────────────────────
      - name: Run Flutter tests
        run: flutter test --reporter compact

      # ── 5. Build web ───────────────────────────────────────────────────
      # API_URL doit être défini dans :
      #   GitHub repo → Settings → Secrets and variables → Actions → Variables
      #   Nom : API_URL
      #   Valeur : https://<votre-service>.onrender.com/api
      #
      # --base-href = chemin GitHub Pages (obligatoire : /nom-du-repo/)
      - name: Build Flutter Web
        run: |
          flutter build web --release \
            --dart-define=API_URL="${{ secrets.API_URL || vars.API_URL || 'https://farmers-market-api-27ih.onrender.com/api' }}" \
            --base-href="/${{ github.event.repository.name }}/"
        env:
          FLUTTER_WEB_RENDERER: canvaskit

      # ── 6. Configurer GitHub Pages ─────────────────────────────────────
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      # ── 7. Uploader l'artifact ─────────────────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      # ── 8. Déployer ────────────────────────────────────────────────────
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
