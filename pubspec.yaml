name: farmers_market_app
description: Farmers Market POS Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^17.2.2

  # HTTP
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1

  # Local storage (offline support)
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Connectivity (offline detection)
  connectivity_plus: ^7.1.1

  # Utilities
  shared_preferences: ^2.2.3
  intl: ^0.20.2
  uuid: ^4.4.0

  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/