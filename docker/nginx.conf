server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Proxy API → container Laravel ────────────────────────────────────
    # Le navigateur appelle http://localhost/api/...
    # Nginx transfère au container "api" sur le réseau Docker interne.
    # Résultat : zéro problème CORS (même origine vue du navigateur).
    location /api/ {
        proxy_pass         http://api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── Flutter SPA — toutes les routes vers index.html ──────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
